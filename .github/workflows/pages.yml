name: Deploy admin demo

on:
  push:
    branches: [main]
    paths:
      - apps/admin/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build demo
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/admin/package-lock.json

      - name: Install dependencies
        working-directory: apps/admin
        run: npm ci

      - name: Build explicit demo
        working-directory: apps/admin
        env:
          VITE_BASE_PATH: /fieldops-service-platform/
          VITE_DEMO_MODE: 'true'
          VITE_API_URL: https://api.example.invalid/api/v1
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/admin/dist

  deploy:
    name: Deploy demo
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
