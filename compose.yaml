name: fieldops

services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fieldops
      POSTGRES_USER: fieldops
      POSTGRES_PASSWORD: ${FIELDOPS_DB_PASSWORD:-fieldops_demo}
    ports:
      - "5432:5432"
    volumes:
      - fieldops_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fieldops -d fieldops"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: deploy/api.Dockerfile
    environment:
      APP_NAME: FieldOps
      APP_ENV: local
      APP_KEY: "${APP_KEY:-base64:ZmllbGRvcHMtZGVtby1rZXktMjAyNi0xMjM0NTY3ODk=}"
      APP_DEBUG: "false"
      APP_URL: http://localhost:8000
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_HOST: database
      DB_PORT: "5432"
      DB_DATABASE: fieldops
      DB_USERNAME: fieldops
      DB_PASSWORD: ${FIELDOPS_DB_PASSWORD:-fieldops_demo}
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CORS_ALLOWED_ORIGINS: http://localhost:8080
      SANCTUM_EXPIRATION: "43200"
      FIELDOPS_SEED_DEMO: "${FIELDOPS_SEED_DEMO:-true}"
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@file_get_contents('http://127.0.0.1:8000/') === false ? 1 : 0);"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  admin:
    build:
      context: apps/admin
      args:
        VITE_API_URL: http://localhost:8000/api/v1
        VITE_DEMO_MODE: "${FIELDOPS_ADMIN_DEMO:-true}"
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  fieldops_postgres:
